name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}

jobs:
  verify:
    name: Verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build validation
        run: docker build --file ./Dockerfile --tag cloud-devops-blog-app:ci .

  build-and-push:
    name: Build and Push ECR Image
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tags
        shell: bash
        run: |
          REGION="$(printf '%s' "${AWS_REGION}" | tr -d '\r\n')"
          REGISTRY="$(printf '%s' "${ECR_REGISTRY}" | tr -d '\r\n' | sed 's#/*$##')"
          REPOSITORY="$(printf '%s' "${ECR_REPOSITORY}" | tr -d '\r\n' | sed 's#^/*##; s#/*$##')"

          if [ -z "${REGION}" ] || [ -z "${REGISTRY}" ] || [ -z "${REPOSITORY}" ]; then
            echo "AWS_DEFAULT_REGION, AWS_ECR_REGISTRY, and AWS_ECR_REPOSITORY secrets are required." >&2
            exit 1
          fi

          if printf '%s' "${REPOSITORY}" | grep -Eq '(^https?://|\.amazonaws\.com)'; then
            echo "AWS_ECR_REPOSITORY must be only the repository name, for example: cloud-devops-blog" >&2
            echo "Do not include the registry URL in AWS_ECR_REPOSITORY." >&2
            exit 1
          fi

          IMAGE="${REGISTRY}/${REPOSITORY}"

          {
            echo "AWS_REGION=${REGION}"
            echo "ECR_REGISTRY=${REGISTRY}"
            echo "ECR_REPOSITORY=${REPOSITORY}"
            echo "IMAGE=${IMAGE}"
          } >> "$GITHUB_ENV"

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          if aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1; then
            echo "ECR repository exists: ${ECR_REPOSITORY}"
          else
            echo "Creating ECR repository: ${ECR_REPOSITORY}"
            aws ecr create-repository \
              --repository-name "${ECR_REPOSITORY}" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 >/dev/null
          fi

      - name: Build and push Docker image
        shell: bash
        run: |
          docker buildx build \
            --file ./Dockerfile \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:production" \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            --push \
            .

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"
            git fetch origin main
            git reset --hard origin/main
            export AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}"
            export AWS_ECR_REGISTRY="${{ secrets.AWS_ECR_REGISTRY }}"
            export AWS_ECR_REPOSITORY="${{ secrets.AWS_ECR_REPOSITORY }}"
            export AWS_DEFAULT_REGION="$(printf '%s' "$AWS_DEFAULT_REGION" | tr -d '\r\n')"
            export AWS_ECR_REGISTRY="$(printf '%s' "$AWS_ECR_REGISTRY" | tr -d '\r\n' | sed 's#/*$##')"
            export AWS_ECR_REPOSITORY="$(printf '%s' "$AWS_ECR_REPOSITORY" | tr -d '\r\n' | sed 's#^/*##; s#/*$##')"
            export APP_IMAGE="${AWS_ECR_REGISTRY}/${AWS_ECR_REPOSITORY}:${{ github.sha }}"
            export DEPLOY_IMAGE_SOURCE="registry"
            export DEPLOY_BRANCH="main"
            export DEPLOY_SKIP_GIT_SYNC="true"
            bash scripts/deploy.sh
