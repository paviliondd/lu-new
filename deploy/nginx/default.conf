map $arg_rest_route $wordpress_rest_query {
    default 1;
    "" 0;
}

map $uri $wordpress_path {
    default 0;
    ~^/wp-admin 1;
    ~^/wp-login\.php$ 1;
    ~^/wp-json 1;
    ~^/wp-content 1;
    ~^/wp-includes 1;
    ~^/wp-cron\.php$ 1;
    ~^/wp-comments-post\.php$ 1;
    ~^/wp-.*\.php$ 1;
    ~^/index\.php$ 1;
    ~^/xmlrpc\.php$ 1;
}

map "$wordpress_rest_query:$wordpress_path" $proxy_target {
    default http://app:3000;
    ~^1: http://wordpress:80;
    ~^0:1$ http://wordpress:80;
}

map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https https;
    http http;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name ${KUMA_DOMAIN};

    client_max_body_size 64m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://uptime-kuma:3001;
    }
}

server {
    listen 80 default_server;
    server_name ${DOMAIN} ${WWW_DOMAIN} _;

    client_max_body_size 64m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /wp-admin {
        return 308 /wp-admin/;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        resolver 127.0.0.11 ipv6=off valid=30s;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass $proxy_target;
    }
}
