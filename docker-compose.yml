services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "sh /docker-entrypoint.d/30-render-site-conf.sh && exec nginx -g 'daemon off;'"]
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
      uptime-kuma:
        condition: service_started
    ports:
      - "${NGINX_HTTP_BIND:-0.0.0.0:80}:80"
      - "${NGINX_HTTPS_BIND:-0.0.0.0:443}:443"
      - "${NGINX_DIAGNOSTIC_BIND:-127.0.0.1:8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/nginx/docker-entrypoint.d:/docker-entrypoint.d:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/letsencrypt:/etc/letsencrypt:ro
    networks:
      - public
      - internal

  app:
    image: ${APP_IMAGE:-cloud-devops-blog-app:production}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://${SITE_DOMAIN}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-linuxunity}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - payload_media:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    expose:
      - "3000"
    networks:
      - internal

  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    expose:
      - "3001"
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - payload_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/letsencrypt:/etc/letsencrypt
    entrypoint: ["certbot"]

volumes:
  payload_postgres_data:
  payload_media:
  uptime_kuma_data:
  redis_data:

networks:
  public:
  internal:
